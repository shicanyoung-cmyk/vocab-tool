<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇教学工具</title>
<style>
/* ========== Reset & Base ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; background: #f0f2f5; color: #333; }

/* ========== Header & Tabs ========== */
.header { background: #4472C4; color: #fff; padding: 16px 24px; }
.header h1 { font-size: 20px; font-weight: 600; }
.tabs { display: flex; background: #fff; border-bottom: 2px solid #e0e0e0; padding: 0 24px; }
.tab { padding: 12px 24px; cursor: pointer; font-size: 15px; border-bottom: 3px solid transparent; color: #666; transition: all 0.2s; user-select: none; }
.tab:hover { color: #4472C4; }
.tab.active { color: #4472C4; border-bottom-color: #4472C4; font-weight: 600; }
.tab-content { display: none; padding: 20px 24px; }
.tab-content.active { display: block; }

/* ========== Common Controls ========== */
.controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; }
.unit-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.unit-tag { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ccc; cursor: pointer; font-size: 13px; transition: all 0.2s; user-select: none; background: #fff; }
.unit-tag:hover { border-color: #4472C4; color: #4472C4; }
.unit-tag.active { background: #4472C4; color: #fff; border-color: #4472C4; }

/* Toggle Switch */
.toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; margin-left: auto; }
.toggle { position: relative; width: 40px; height: 22px; background: #ccc; border-radius: 11px; cursor: pointer; transition: background 0.2s; }
.toggle.on { background: #4472C4; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle.on::after { transform: translateX(18px); }

/* ========== Tab 1: Card Browse ========== */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.card-info { padding: 10px; text-align: center; }
.card-word { font-size: 18px; font-weight: 600; color: #333; }
.card-chinese { font-size: 13px; color: #999; margin-top: 2px; display: none; }
.show-chinese .card-chinese { display: block; }

/* Card Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.lightbox.show { display: flex; }
.lightbox-content { background: #fff; border-radius: 12px; padding: 20px; max-width: 400px; text-align: center; }
.lightbox-content img { width: 100%; max-height: 350px; object-fit: contain; border-radius: 8px; }
.lightbox-content .lb-word { font-size: 28px; font-weight: 700; margin: 12px 0 4px; }
.lightbox-content .lb-chinese { font-size: 16px; color: #888; }
.lightbox-close { position: absolute; top: 20px; right: 24px; font-size: 32px; color: #fff; cursor: pointer; }

/* ========== Tab 2: Random Picker ========== */
.picker-controls { max-width: 600px; }
.mode-btns { display: flex; gap: 10px; margin-bottom: 16px; }
.mode-btn { padding: 10px 20px; border-radius: 8px; border: 2px solid #ccc; cursor: pointer; font-size: 14px; background: #fff; transition: all 0.2s; }
.mode-btn.active { border-color: #4472C4; background: #4472C4; color: #fff; }

.picker-stage { background: #fff; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 20px; }
.picker-display { font-size: 72px; font-weight: 700; color: #4472C4; min-height: 90px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
.picker-display.rolling { animation: roll 0.08s infinite; }
@keyframes roll { 0% { opacity: 0.7; transform: scale(0.97); } 50% { opacity: 1; transform: scale(1.03); } 100% { opacity: 0.7; transform: scale(0.97); } }
.picker-display img { max-width: 250px; max-height: 250px; border-radius: 12px; object-fit: contain; }
.picker-chinese { font-size: 20px; color: #888; margin-top: 8px; }
.picker-btn { margin-top: 24px; padding: 14px 48px; font-size: 18px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
.picker-btn.start { background: #4472C4; color: #fff; }
.picker-btn.start:hover { background: #3a5fa0; }
.picker-btn.stop { background: #e74c3c; color: #fff; }
.picker-btn.stop:hover { background: #c0392b; }
.picker-btn:disabled { background: #ccc; cursor: not-allowed; }

.picker-placeholder { color: #bbb; font-size: 16px; }

/* ========== Tab 3: A4 Print ========== */
.print-layout { display: flex; gap: 20px; height: calc(100vh - 180px); }
.print-sidebar { width: 280px; flex-shrink: 0; background: #fff; border-radius: 10px; padding: 16px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.print-sidebar h3 { font-size: 14px; color: #666; margin-bottom: 12px; }
.print-word-list { display: flex; flex-direction: column; gap: 4px; }
.print-word-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
.print-word-item:hover { background: #f5f5f5; }
.print-word-item input[type="checkbox"] { accent-color: #4472C4; width: 16px; height: 16px; }
.print-word-item img { width: 28px; height: 28px; object-fit: cover; border-radius: 4px; }
.print-sidebar-actions { margin-top: 12px; display: flex; gap: 8px; }
.print-sidebar-actions button { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-select-all { background: #e8f0fe; color: #4472C4; }
.btn-print { background: #4472C4; color: #fff; }
.btn-print:hover { background: #3a5fa0; }
.selected-count { font-size: 12px; color: #888; margin-top: 8px; text-align: center; }

.print-preview-wrap { flex: 1; overflow-y: auto; background: #999; padding: 20px; border-radius: 10px; display: flex; justify-content: center; }
.print-preview { width: 210mm; min-height: 297mm; background: #fff; padding: 15mm 12mm; box-shadow: 0 2px 16px rgba(0,0,0,0.2); position: relative; }
.print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8mm; }
.print-cell { display: flex; align-items: center; gap: 4mm; padding: 3mm; border: 1px dashed #ddd; border-radius: 6px; }
.print-cell img { width: 30mm; height: 30mm; object-fit: cover; border-radius: 4px; }
.print-cell-text .pw { font-size: 14pt; font-weight: 700; }
.print-cell-text .pc { font-size: 10pt; color: #888; margin-top: 1mm; }
.print-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 16px; }

/* ========== Print Styles ========== */
@media print {
  body { background: #fff; }
  .header, .tabs, .print-sidebar, .tab-content, .print-preview-wrap { display: none !important; }
  .print-area { display: block !important; position: static !important; }
  .print-preview { width: 100%; min-height: auto; padding: 10mm; box-shadow: none; margin: 0; }
}

.print-area { display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header"><h1>📚 词汇教学工具</h1></div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="cards">📖 卡片浏览</div>
  <div class="tab" data-tab="picker">🎲 随机抽取</div>
  <div class="tab" data-tab="print">🖨️ A4打印</div>
</div>

<!-- Tab 1: Card Browse -->
<div class="tab-content active" id="tab-cards">
  <div class="controls">
    <div class="unit-tags" id="card-unit-tags"></div>
    <div class="toggle-wrap">
      显示中文
      <div class="toggle" id="toggle-chinese" onclick="toggleChinese()"></div>
    </div>
  </div>
  <div class="card-grid" id="card-grid"></div>
</div>

<!-- Tab 2: Random Picker -->
<div class="tab-content" id="tab-picker">
  <div class="picker-controls">
    <div class="unit-tags" id="picker-unit-tags"></div>
    <div class="mode-btns">
      <div class="mode-btn active" data-mode="image" onclick="setPickerMode('image')">🖼️ 抽图片</div>
      <div class="mode-btn" data-mode="word" onclick="setPickerMode('word')">🔤 抽单词</div>
    </div>
  </div>
  <div class="picker-stage">
    <div class="picker-display" id="picker-display">
      <span class="picker-placeholder">请勾选单元后开始抽取</span>
    </div>
    <button class="picker-btn start" id="picker-btn" onclick="togglePicker()" disabled>开始抽取</button>
  </div>
</div>

<!-- Tab 3: A4 Print -->
<div class="tab-content" id="tab-print">
  <div class="print-layout">
    <div class="print-sidebar">
      <h3>选择要打印的单词（可跨单元）</h3>
      <div class="unit-tags" id="print-unit-tags" style="margin-bottom:12px"></div>
      <div class="print-word-list" id="print-word-list"></div>
      <div class="selected-count" id="selected-count">已选 0 个</div>
      <div class="print-sidebar-actions">
        <button class="btn-select-all" onclick="toggleSelectAll()">全选/取消</button>
        <button class="btn-print" onclick="window.print()">打印</button>
      </div>
    </div>
    <div class="print-preview-wrap">
      <div class="print-preview" id="print-preview">
        <div class="print-empty">在左侧勾选单词后预览</div>
      </div>
    </div>
  </div>
</div>

<!-- Print-only area (hidden on screen, shown when printing) -->
<div class="print-area" id="print-area"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <img id="lb-img" src="">
    <div class="lb-word" id="lb-word"></div>
    <div class="lb-chinese" id="lb-chinese"></div>
  </div>
</div>

const IMAGE_BASE = "";  // single-file mode
</script>

<script>
// ========== Helper: get image URL ==========
function getImgSrc(w) {
  // Single-file mode: base64 embedded
  if (w.image_b64) return w.image_b64;
  // CDN online mode
  if (w.image_url) return w.image_url;
  // Offline mode: local file path
  return IMAGE_BASE + w.unit_id + '/' + w.image_file;
}

// ========== State ==========
let currentTab = 'cards';
let selectedCardUnits = new Set();
let pickerMode = 'image';
let selectedPickerUnits = new Set();
let selectedPrintUnits = new Set();
let selectedPrintWords = new Set();
let pickerRolling = false;
let pickerInterval = null;
let showChinese = false;

// ========== Init ==========
function init() {
  const allUnits = new Set(VOCAB_DATA.units.map(u => u.unit_id));
  selectedCardUnits = new Set(allUnits);
  selectedPickerUnits = new Set(allUnits);
  selectedPrintUnits = new Set(allUnits);
  renderCardUnitTags();
  renderPickerUnitTags();
  renderPrintUnitTags();
  renderCards();
  renderPrintWordList();
}

// ========== Tab Switching ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    currentTab = tab.dataset.tab;
    if (tab.dataset.tab === 'print') updatePrintPreview();
  });
});

// ========== Tab 1: Card Browse ==========
function renderCardUnitTags() {
  const c = document.getElementById('card-unit-tags');
  let html = '<span class="unit-tag' + (selectedCardUnits.size === VOCAB_DATA.units.length ? ' active' : '') + '" onclick="toggleAllCardUnits()">全部</span>';
  VOCAB_DATA.units.forEach(u => {
    html += '<span class="unit-tag' + (selectedCardUnits.has(u.unit_id) ? ' active' : '') + '" onclick="toggleCardUnit(\'' + u.unit_id + '\')">' + u.unit_name + '</span>';
  });
  c.innerHTML = html;
}

function toggleCardUnit(uid) {
  if (selectedCardUnits.has(uid)) selectedCardUnits.delete(uid);
  else selectedCardUnits.add(uid);
  renderCardUnitTags();
  renderCards();
}

function toggleAllCardUnits() {
  if (selectedCardUnits.size === VOCAB_DATA.units.length) selectedCardUnits.clear();
  else VOCAB_DATA.units.forEach(u => selectedCardUnits.add(u.unit_id));
  renderCardUnitTags();
  renderCards();
}

function toggleChinese() {
  showChinese = !showChinese;
  document.getElementById('toggle-chinese').classList.toggle('on', showChinese);
  document.getElementById('tab-cards').classList.toggle('show-chinese', showChinese);
  // Also update lightbox
  document.getElementById('lb-chinese').style.display = showChinese ? 'block' : 'none';
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  const words = VOCAB_DATA.words.filter(w => selectedCardUnits.has(w.unit_id));
  if (words.length === 0) {
    grid.innerHTML = '<div style="color:#999;padding:40px;text-align:center;">请选择单元</div>';
    return;
  }
  grid.innerHTML = words.map(w => {
    return '<div class="card" onclick="openLightbox(\'' + w.word + '\')">' +
      '<img src="' + getImgSrc(w) + '" alt="' + w.word + '" onerror="this.style.background=\'#eee\'">' +
      '<div class="card-info"><div class="card-word">' + w.word + '</div><div class="card-chinese">' + w.chinese + '</div></div>' +
      '</div>';
  }).join('');
}

function openLightbox(word) {
  const w = VOCAB_DATA.words.find(x => x.word === word);
  if (!w) return;
  document.getElementById('lb-img').src = getImgSrc(w);
  document.getElementById('lb-word').textContent = w.word;
  document.getElementById('lb-chinese').textContent = w.chinese;
  document.getElementById('lb-chinese').style.display = showChinese ? 'block' : 'none';
  document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// ========== Tab 2: Random Picker ==========
function renderPickerUnitTags() {
  const c = document.getElementById('picker-unit-tags');
  let html = '<span class="unit-tag' + (selectedPickerUnits.size === VOCAB_DATA.units.length ? ' active' : '') + '" onclick="toggleAllPickerUnits()">全部</span>';
  VOCAB_DATA.units.forEach(u => {
    html += '<span class="unit-tag' + (selectedPickerUnits.has(u.unit_id) ? ' active' : '') + '" onclick="togglePickerUnit(\'' + u.unit_id + '\')">' + u.unit_name + '</span>';
  });
  c.innerHTML = html;
  updatePickerBtn();
}

function togglePickerUnit(uid) {
  if (selectedPickerUnits.has(uid)) selectedPickerUnits.delete(uid);
  else selectedPickerUnits.add(uid);
  renderPickerUnitTags();
  if (!pickerRolling) resetPickerDisplay();
}

function toggleAllPickerUnits() {
  if (selectedPickerUnits.size === VOCAB_DATA.units.length) selectedPickerUnits.clear();
  else VOCAB_DATA.units.forEach(u => selectedPickerUnits.add(u.unit_id));
  renderPickerUnitTags();
  if (!pickerRolling) resetPickerDisplay();
}

function setPickerMode(mode) {
  pickerMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  if (!pickerRolling) resetPickerDisplay();
}

function getPickerWords() {
  return VOCAB_DATA.words.filter(w => selectedPickerUnits.has(w.unit_id));
}

function updatePickerBtn() {
  const btn = document.getElementById('picker-btn');
  btn.disabled = selectedPickerUnits.size === 0;
}

function resetPickerDisplay() {
  const display = document.getElementById('picker-display');
  display.classList.remove('rolling');
  if (selectedPickerUnits.size === 0) {
    display.innerHTML = '<span class="picker-placeholder">请勾选单元后开始抽取</span>';
  } else {
    display.innerHTML = '<span class="picker-placeholder">点击「开始抽取」</span>';
  }
}

function togglePicker() {
  if (pickerRolling) {
    stopPicker();
  } else {
    startPicker();
  }
}

function startPicker() {
  const words = getPickerWords();
  if (words.length === 0) return;

  pickerRolling = true;
  const btn = document.getElementById('picker-btn');
  btn.textContent = '停止';
  btn.classList.remove('start');
  btn.classList.add('stop');
  btn.disabled = false;

  const display = document.getElementById('picker-display');
  display.classList.add('rolling');

  pickerInterval = setInterval(() => {
    const w = words[Math.floor(Math.random() * words.length)];
    if (pickerMode === 'image') {
      display.innerHTML = '<img src="' + getImgSrc(w) + '">';
    } else {
      display.innerHTML = '<span>' + w.word + '</span>';
    }
  }, 60);
}

function stopPicker() {
  pickerRolling = false;
  clearInterval(pickerInterval);

  const btn = document.getElementById('picker-btn');
  btn.textContent = '开始抽取';
  btn.classList.remove('stop');
  btn.classList.add('start');

  const display = document.getElementById('picker-display');
  display.classList.remove('rolling');

  // Final pick
  const words = getPickerWords();
  const w = words[Math.floor(Math.random() * words.length)];

  if (pickerMode === 'image') {
    display.innerHTML = '<img src="' + getImgSrc(w) + '">';
  } else {
    display.innerHTML = '<span>' + w.word + '</span>';
  }
  // 不显示中文，让学生自己认
}

// ========== Tab 3: A4 Print ==========
function renderPrintUnitTags() {
  const c = document.getElementById('print-unit-tags');
  let html = '<span class="unit-tag' + (selectedPrintUnits.size === VOCAB_DATA.units.length ? ' active' : '') + '" onclick="toggleAllPrintUnits()">全部</span>';
  VOCAB_DATA.units.forEach(u => {
    html += '<span class="unit-tag' + (selectedPrintUnits.has(u.unit_id) ? ' active' : '') + '" onclick="togglePrintUnit(\'' + u.unit_id + '\')">' + u.unit_name + '</span>';
  });
  c.innerHTML = html;
}

function togglePrintUnit(uid) {
  if (selectedPrintUnits.has(uid)) selectedPrintUnits.delete(uid);
  else selectedPrintUnits.add(uid);
  renderPrintUnitTags();
  renderPrintWordList();
}

function toggleAllPrintUnits() {
  if (selectedPrintUnits.size === VOCAB_DATA.units.length) selectedPrintUnits.clear();
  else VOCAB_DATA.units.forEach(u => selectedPrintUnits.add(u.unit_id));
  renderPrintUnitTags();
  renderPrintWordList();
}

function renderPrintWordList() {
  const c = document.getElementById('print-word-list');
  const words = VOCAB_DATA.words.filter(w => selectedPrintUnits.has(w.unit_id));
  c.innerHTML = words.map(w => {
    const checked = selectedPrintWords.has(w.word) ? 'checked' : '';
    return '<label class="print-word-item"><input type="checkbox" ' + checked + ' onchange="togglePrintWord(\'' + w.word + '\')">' +
      '<img src="' + getImgSrc(w) + '" onerror="this.style.display=\'none\'">' +
      '<span>' + w.word + '</span></label>';
  }).join('');
  updateSelectedCount();
  updatePrintPreview();
}

function togglePrintWord(word) {
  if (selectedPrintWords.has(word)) selectedPrintWords.delete(word);
  else selectedPrintWords.add(word);
  updateSelectedCount();
  updatePrintPreview();
}

function toggleSelectAll() {
  const words = VOCAB_DATA.words.filter(w => selectedPrintUnits.has(w.unit_id));
  const allSelected = words.every(w => selectedPrintWords.has(w.word));
  if (allSelected) {
    words.forEach(w => selectedPrintWords.delete(w.word));
  } else {
    words.forEach(w => selectedPrintWords.add(w.word));
  }
  renderPrintWordList();
}

function updateSelectedCount() {
  document.getElementById('selected-count').textContent = '已选 ' + selectedPrintWords.size + ' 个';
}

function updatePrintPreview() {
  const preview = document.getElementById('print-preview');
  const printArea = document.getElementById('print-area');
  const selectedWords = VOCAB_DATA.words.filter(w => selectedPrintWords.has(w.word));

  if (selectedWords.length === 0) {
    preview.innerHTML = '<div class="print-empty">在左侧勾选单词后预览</div>';
    printArea.innerHTML = '';
    return;
  }

  const cellsHtml = selectedWords.map(w => {
    return '<div class="print-cell">' +
      '<img src="' + getImgSrc(w) + '">' +
      '<div class="print-cell-text"><div class="pw">' + w.word + '</div><div class="pc">' + w.chinese + '</div></div>' +
      '</div>';
  }).join('');

  const gridHtml = '<div class="print-grid">' + cellsHtml + '</div>';
  preview.innerHTML = gridHtml;
  printArea.innerHTML = '<div class="print-preview">' + gridHtml + '</div>';
}

// ========== Boot ==========
init();
</script>
</body>
</html>
